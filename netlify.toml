[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/precios.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "https://www.preciodelgas.com/*"
  to   = "https://preciodelgas.com/:splat"
  status = 301
  force  = true
